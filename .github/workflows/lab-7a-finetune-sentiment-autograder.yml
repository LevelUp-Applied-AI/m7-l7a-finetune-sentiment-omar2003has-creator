name: Lab 7A — Fine-Tune Sentiment Autograder
on:
  push:
    branches: ['*']
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --index-url https://download.pytorch.org/whl/cpu torch
          pip install -r requirements.txt

      - name: Run lab pipeline on smoke fixture
        env:
          DATA_PATH: fixtures/tiny_app_reviews.csv
          HF_HUB_DISABLE_TELEMETRY: '1'
        run: python lab.py

      - name: Run autograder tests
        run: pytest tests/ -v
